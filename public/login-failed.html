<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logowanie nieudane</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #f6f7fb;
      color: #18202a;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .box {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
      max-width: 520px;
    }
    a {
      display: inline-block;
      margin-top: 16px;
      color: #0f6cbd;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Logowanie nieudane</h1>
    <p>Sprawdź, czy logujesz się firmowym mailem i czy callback URL w Google OAuth jest ustawiony poprawnie.</p>
    <a href="/">Wróć</a>
  </div>
</body>
</html>
